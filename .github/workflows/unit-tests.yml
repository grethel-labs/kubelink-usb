name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run strict lint checks
        run: make lint

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: make test

      - name: Coverage gates
        run: make coverage-check

  build-binaries:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build binaries
        run: make build

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: kubelink-usb-binaries
          path: |
            bin/controller
            bin/agent
            bin/kubectl-usb
          if-no-files-found: error

  build-images:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project metadata
        id: meta
        run: |
          # shellcheck source=project.env
          source project.env
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "controller_img=$CONTROLLER_IMG" >> "$GITHUB_OUTPUT"
          echo "agent_img=$AGENT_IMG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.controller_img }}:ci

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.agent_img }}:ci

  helm-lint:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint charts/kubelink-usb

      - name: Helm template
        run: helm template kubelink-usb charts/kubelink-usb

  docs-check:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gomarkdoc
        run: go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@v1.1.0

      - name: Regenerate code docs
        run: make docs

      - name: Verify generated docs are committed
        run: git diff --exit-code

  publish-images:
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-test
      - build-binaries
      - build-images
      - helm-lint
      - docs-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project metadata
        id: meta
        run: |
          # shellcheck source=project.env
          source project.env
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "controller_img=$CONTROLLER_IMG" >> "$GITHUB_OUTPUT"
          echo "agent_img=$AGENT_IMG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.controller_img }}:latest
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.controller_img }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.controller_img }}:${{ github.sha }}

      - name: Publish agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.agent_img }}:latest
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.agent_img }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.registry }}/${{ steps.meta.outputs.agent_img }}:${{ github.sha }}
