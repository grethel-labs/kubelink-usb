apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubelink-usb-controller
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubelink-usb-controller
  template:
    metadata:
      labels:
        app: kubelink-usb-controller
    spec:
      serviceAccountName: default
      containers:
        - name: manager
          image: ghcr.io/yourname/k8s-usb-fabric-controller:latest
          command: ["/manager"]
