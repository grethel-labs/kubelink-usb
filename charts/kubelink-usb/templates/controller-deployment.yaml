apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubelink-usb.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "kubelink-usb.name" . }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubelink-usb.name" . }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubelink-usb.name" . }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "kubelink-usb.controllerServiceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          command: ["/manager"]
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
